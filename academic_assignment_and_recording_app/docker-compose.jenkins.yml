name: jenkins_infrastructure

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: jenkins_server:latest
    container_name: jenkins_server
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci_network

volumes:
  jenkins_data:

networks:
  ci_network:
    name: ci_network